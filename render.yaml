services:
  - type: web
    name: proyecciones-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_render:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
  - type: web
    name: proyecciones-streamlit
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ProyAst.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: API_URL
        sync: false
      - key: API_KEY
        sync: false
