services:
  - type: web
    name: proyecciones-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_render:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://tu-sitio.com
